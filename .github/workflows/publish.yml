name: Publish
run-name: >-
    Publish • ${{ github.event_name }} • ${{ github.ref_name }}

on:
    workflow_dispatch:
        inputs:
            release:
                description: "Release type (patch, minor, major) or explicit x.y.z"
                type: string
                required: false
                default: patch
            ref:
                description: "Branch to release from"
                type: string
                required: false
                default: main

permissions:
    contents: write

concurrency:
    group: publish-${{ github.ref }}
    cancel-in-progress: true

jobs:
    publish:
        name: Publish package
        runs-on: ubuntu-latest
        timeout-minutes: 45
        defaults:
            run:
                shell: bash
        permissions:
            contents: write
            id-token: write
        env:
            CI: "true"
            DEFAULT_RELEASE_BRANCH: "main"
            NPM_REGISTRY_URL: "https://registry.npmjs.org"
        steps:
            - name: Harden runner
              uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d
              with:
                  egress-policy: audit

            - name: Checkout repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
              with:
                  fetch-depth: 0
                  ref: ${{ inputs.ref }}

            - name: Setup Node.js
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
              with:
                  node-version: "20"
                  cache: npm
                  registry-url: https://registry.npmjs.org

            - name: Install dependencies
              run: npm ci --force

            - name: Build package
              run: npm run build

            - name: Run quality gates
              run: |
                  npm run lint
                  npm run typecheck
                  npm test -- --run

            - name: Resolve next version
              id: version
              env:
                  RELEASE_INPUT: ${{ inputs.release }}
              run: |
                  if [[ "$RELEASE_INPUT" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                    NEW_VERSION="$RELEASE_INPUT"
                  else
                    NEW_VERSION=$(npm version "$RELEASE_INPUT" --no-git-tag-version)
                    NEW_VERSION="${NEW_VERSION#v}"
                  fi
                  echo "new-version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

            - name: Pack artifact
              run: npm pack

            - name: Publish to npm
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
              run: npm publish --access public --provenance --ignore-scripts

            - name: Create GitHub release
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  gh release create "v${{ steps.version.outputs.new-version }}" \
                    --title "v${{ steps.version.outputs.new-version }}" \
                    --notes "Automated release of version v${{ steps.version.outputs.new-version }}." \
                    ./*.tgz
