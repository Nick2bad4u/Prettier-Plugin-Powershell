name: Manual Publish Deprecated
run-name: >-
    Manual Publish Notice • ${{ github.actor }}

on:
    workflow_dispatch:

permissions:
    contents: read

concurrency:
    group: manual-publish-${{ github.ref }}
    cancel-in-progress: true

jobs:
    notify:
        name: Notify deprecated publish flow
        runs-on: ubuntu-latest
        timeout-minutes: 5
        defaults:
            run:
                shell: bash
        steps:
            - name: Manual publish disabled
              run: |
                  echo "Manual publishing has been retired."
                  echo "Pushes to main now trigger the automated publish workflow. Use the 'Publish' workflow_dispatch job only for ad-hoc releases."
