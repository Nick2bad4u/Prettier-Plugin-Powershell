name: Truffle Hog Secret Scan
run-name: >-
    Trufflehog • ${{ github.event_name }} • ${{ github.ref_name }}

on:
    push:
        branches:
            - main
    pull_request:
    merge_group:
        types:
            - checks_requested
    schedule:
        - cron: "0 5 * * 0"

permissions:
    contents: read

concurrency:
    group: trufflehog-${{ github.ref }}
    cancel-in-progress: true

jobs:
    trufflehog:
        name: Trufflehog scan
        runs-on: ubuntu-latest
        timeout-minutes: 20
        steps:
            - name: Harden the runner (Audit all outbound calls)
              uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
              with:
                  egress-policy: audit

            - name: Checkout code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  fetch-depth: 0
            - name: Secret Scanning (entire repo)
              uses: trufflesecurity/trufflehog@47e7b7cd74f578e1e3145d48f669f22fd1330ca6 # v3.94.3
              with:
                  base: ""
                  head: ${{ github.ref_name }}
                  extra_args: --results=verified,unknown --config=.trufflehog.yml --allowlist=.trufflehog.allowlist.json
