name: Truffle Hog Secret Scan
run-name: >-
    Trufflehog • ${{ github.event_name }} • ${{ github.ref_name }}

on:
    push:
        branches:
            - main
    pull_request:
    merge_group:
        types:
            - checks_requested
    schedule:
        - cron: "0 5 * * 0"

permissions:
    contents: read

concurrency:
    group: trufflehog-${{ github.ref }}
    cancel-in-progress: true

jobs:
    trufflehog:
        name: Trufflehog scan
        runs-on: ubuntu-latest
        timeout-minutes: 20
        steps:
            - name: Harden the runner (Audit all outbound calls)
              uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
              with:
                  egress-policy: audit

            - name: Checkout code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  fetch-depth: 0
            - name: Secret Scanning (entire repo)
              uses: trufflesecurity/trufflehog@586f66d7886cd0b037c7c245d4a6e34ef357ab10 # v3.94.1
              with:
                  base: ""
                  head: ${{ github.ref_name }}
                  extra_args: --results=verified,unknown
